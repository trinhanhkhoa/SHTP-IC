<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHTP-IC Project Dashboard - System Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">
    <div id="login-screen" class="fixed inset-0 bg-indigo-950 flex items-center justify-center z-[100] px-4 overflow-y-auto py-6">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-6 sm:p-8 space-y-6 animate-fade-in my-auto">
            <div class="text-center space-y-2">
                <div class="inline-flex items-center justify-center w-20 h-20 mb-2 overflow-hidden rounded-full border border-gray-100 bg-white p-1 shadow-sm">
                    <i class="fa-solid fa-shield-halved text-3xl text-indigo-900"></i>
                </div>
                <h2 class="text-lg sm:text-xl font-bold text-gray-900 tracking-wide">HỆ THỐNG ƯƠM TẠO SHTP-IC</h2>
                <p class="text-xs text-gray-400 font-medium">Vui lòng đăng nhập để truy cập hệ thống số hóa</p>
            </div>

            <div id="login-error" class="hidden bg-red-50 text-red-600 text-xs font-semibold p-3 rounded-lg border border-red-100 flex items-center space-x-2">
                <i class="fa-solid fa-circle-exclamation text-sm"></i>
                <span>Tài khoản hoặc mật khẩu không chính xác!</span>
            </div>

            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div class="flex flex-col">
                    <label class="text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Tên đăng nhập</label>
                    <input type="text" id="username" required placeholder="Tài khoản (admin)" value="admin" class="w-full border border-gray-200 rounded-xl p-3 text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div class="flex flex-col">
                    <label class="text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Mật khẩu</label>
                    <input type="password" id="password" required placeholder="Mật khẩu (123456)" value="123456" class="w-full border border-gray-200 rounded-xl p-3 text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold p-3 rounded-xl shadow-md transition-all text-sm flex items-center justify-center space-x-2">
                    <span>Đăng Nhập</span>
                </button>
            </form>
        </div>
    </div>

    <div id="main-application" class="hidden min-h-screen flex flex-col">
        <header class="bg-indigo-900 text-white shadow-md sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3.5 flex flex-col md:flex-row justify-between items-center gap-3.5">
                <div class="flex justify-between items-center w-full md:w-auto">
                    <div class="flex items-center space-x-2.5">
                        <i class="fa-solid fa-chart-pie text-xl sm:text-2xl text-cyan-400"></i>
                        <h1 class="text-base sm:text-lg font-bold tracking-wide uppercase">SHTP-IC SỐ HÓA ƯƠM TẠO</h1>
                    </div>
                    <button onclick="toggleMobileMenu()" class="md:hidden text-white focus:outline-none text-xl p-1"><i id="menu-icon" class="fa-solid fa-bars"></i></button>
                </div>
                
                <div id="nav-container" class="hidden md:flex flex-col md:flex-row items-stretch md:items-center gap-3 w-full md:w-auto transition-all duration-300">
                    <nav class="flex flex-col md:flex-row bg-indigo-950 p-1 rounded-xl gap-1 md:gap-0">
                        <button onclick="switchPage('dashboard')" id="btn-dashboard" class="tab-btn px-3 py-2 text-left md:text-center rounded-lg font-medium text-xs sm:text-sm transition-all bg-indigo-600 text-white">Dashboard</button>
                        <button onclick="switchPage('projects')" id="btn-projects" class="tab-btn px-3 py-2 text-left md:text-center rounded-lg font-medium text-xs sm:text-sm transition-all text-gray-300 hover:text-white">Danh Mục Dự Án</button>
                        <button onclick="switchPage('shtt')" id="btn-shtt" class="tab-btn px-3 py-2 text-left md:text-center rounded-lg font-medium text-xs sm:text-sm transition-all text-gray-300 hover:text-white">Sở Hữu Trí Tuệ</button>
                        <button onclick="switchPage('certs')" id="btn-certs" class="tab-btn px-3 py-2 text-left md:text-center rounded-lg font-medium text-xs sm:text-sm transition-all text-gray-300 hover:text-white">Chứng Nhận & Tiêu Chuẩn</button>
                    </nav>
                    <button onclick="handleLogout()" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3 py-2 rounded-xl flex items-center justify-center space-x-1.5 transition-all w-full md:w-auto"><span>Đăng xuất</span></button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex-grow w-full">
            <iframe id="content-frame" src="pages/dashboard.html" class="w-full h-[78vh] border border-gray-100 rounded-2xl shadow-sm bg-white"></iframe>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
