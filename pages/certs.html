<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white text-xs text-gray-700 p-2 sm:p-4">
    <div class="space-y-4 border border-slate-200 rounded-2xl p-4 sm:p-5 shadow-sm">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <input type="text" id="search" oninput="render()" placeholder="Lọc theo công ty..." class="border border-slate-200 rounded-xl p-2.5 bg-slate-50 outline-none text-xs focus:border-blue-500">
            <select id="f-state" onchange="render()" class="border border-slate-200 rounded-xl p-2.5 bg-white outline-none text-xs"><option value="All">Tất cả hiện trạng duyệt</option><option value="Chưa nộp đơn">Chưa nộp đơn</option><option value="Đã nộp đơn">Đã nộp đơn</option><option value="Đã cấp giấy">Đã cấp giấy</option></select>
        </div>

        <div class="overflow-hidden border border-slate-200 rounded-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs min-w-[550px]">
                    <thead class="bg-slate-900 text-white text-[10px] uppercase font-bold">
                        <tr>
                            <th class="p-3 text-center w-12">STT</th>
                            <th class="p-3">Doanh nghiệp uơm tạo</th>
                            <th class="p-3">Mục tiêu chứng chỉ / Hướng hỗ trợ</th>
                            <th class="p-3 text-center w-40">Hiện trạng hồ sơ</th>
                            <th class="p-3">Ghi chú nghiệp vụ</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-slate-100 bg-white"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const db_certs = JSON.parse(localStorage.getItem('db_certs')) || [];
        const certLabels = { "Đã cấp giấy": "bg-emerald-50 text-emerald-600 border border-emerald-100 font-bold", "Đã nộp đơn": "bg-blue-50 text-blue-600 border border-blue-100 font-medium", "Chưa nộp đơn": "bg-slate-100 text-slate-400" };

        function render() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            const state = document.getElementById('f-state').value;
            let filtered = db_certs.filter(c => (c.companyName || '').toLowerCase().includes(query) && (state === 'All' || c.state === state));

            let count = 1;
            document.getElementById('tbody').innerHTML = filtered.map(c => `
                <tr class="hover:bg-slate-50/50">
                    <td class="p-3 text-center font-bold text-slate-400">${count++}</td>
                    <td class="p-3 font-bold text-slate-700">${c.companyName}</td>
                    <td class="p-3 font-medium text-slate-600 flex items-center">
                        <i class="fa-solid fa-bookmark text-blue-500 mr-2 shrink-0 w-4 text-center"></i>
                        <span class="leading-tight">${c.type}</span>
                    </td>
                    <td class="p-3 text-center"><span class="px-2.5 py-0.5 rounded text-[9px] font-bold border ${certLabels[c.state] || 'bg-slate-50'}">${c.state}</span></td>
                    <td class="p-3 text-slate-400 italic text-[11px]">${c.note || '-'}</td>
                </tr>
            `).join('');
        }
        window.onload = render;
    </script>
</body>
</html>
