<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 sm:p-6 bg-white text-gray-800">
    <div class="space-y-4">
        <h2 class="text-md font-bold text-gray-700">Chứng nhận Doanh nghiệp KH&CN & Tiêu chuẩn</h2>
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 grid grid-cols-1 sm:grid-cols-2 gap-3 items-end">
            <select id="filter-type" onchange="render()" class="border border-gray-200 rounded-xl p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="All">Tất cả loại chứng nhận</option><option value="DN Khoa học & Công nghệ">DN Khoa học & Công nghệ</option><option value="ISO">ISO</option><option value="TCCS">TCCS</option>
            </select>
            <select id="filter-state" onchange="render()" class="border border-gray-200 rounded-xl p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="All">Tất cả trạng thái thẩm định</option><option value="Chưa nộp đơn">Chưa nộp đơn</option><option value="Đã nộp đơn">Đã nộp đơn</option><option value="Đã cấp giấy">Đã cấp giấy</option>
            </select>
        </div>
        <div class="border border-gray-100 rounded-xl overflow-hidden overflow-x-auto">
            <table class="w-full text-left text-xs sm:text-sm min-w-[600px]">
                <thead class="bg-indigo-900 text-white uppercase text-[11px]">
                    <tr><th class="p-3 text-center">Mã DA</th><th class="p-3">Tên dự án</th><th class="p-3">Loại chứng chỉ</th><th class="p-3 text-center">Trạng thái duyệt</th><th class="p-3">Số chứng nhận / Ghi chú</th></tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
    <script src="../js/data.js"></script>
    <script>
        function render() {
            const type = document.getElementById('filter-type').value;
            const state = document.getElementById('filter-state').value;

            let filtered = db_certs.filter(c => (type === 'All' || c.type === type) && (state === 'All' || c.state === state));
            document.getElementById('table-body').innerHTML = filtered.map(c => {
                let proj = db_projects.find(p => p.id === c.id);
                return `<tr class="hover:bg-gray-50"><td class="p-3 font-bold text-center text-indigo-900">${c.id}</td><td class="p-3 font-medium">${proj?proj.name:'N/A'}</td><td class="p-3">${c.type}</td><td class="p-3 text-center">${c.state}</td><td class="p-3 italic text-gray-500">${c.note}</td></tr>`;
            }).join('');
        }
        window.onload = render;
    </script>
</body>
</html>
