<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="p-4 sm:p-6 bg-white animate-fade-in text-gray-800">
    <div class="space-y-6">
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 grid grid-cols-1 sm:grid-cols-3 gap-4 items-end">
            <div class="flex flex-col sm:col-span-1">
                <label class="text-[11px] text-gray-400 font-bold mb-1 uppercase">Tìm kiếm dự án</label>
                <input type="text" id="search-dashboard" oninput="render()" placeholder="Nhập tên..." class="w-full border border-gray-200 rounded-xl p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex flex-col">
                <label class="text-[11px] text-gray-400 font-bold mb-1 uppercase">Lĩnh vực</label>
                <select id="filter-sector" onchange="render()" class="border border-gray-200 rounded-xl p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="All">Tất cả lĩnh vực</option>
                    <option value="Công nghệ số">Công nghệ số</option>
                    <option value="IoT">IoT</option>
                    <option value="AI">AI</option>
                    <option value="Sinh học">Sinh học</option>
                </select>
            </div>
            <div class="flex flex-col">
                <label class="text-[11px] text-gray-400 font-bold mb-1 uppercase">Hiện trạng</label>
                <select id="filter-status" onchange="render()" class="border border-gray-200 rounded-xl p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="All">Tất cả hiện trạng</option>
                    <option value="Còn hoạt động">Còn hoạt động</option>
                    <option value="Tạm ngừng">Tạm ngừng</option>
                    <option value="Ngưng hoạt động">Ngưng hoạt động</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
            <div class="bg-indigo-50/50 p-4 rounded-xl border border-indigo-100 flex flex-col justify-between">
                <span class="text-[11px] font-bold text-gray-400 uppercase">Tổng doanh thu</span>
                <span id="kpi-revenue" class="text-lg font-bold text-indigo-900 my-1 truncate">0 VND</span>
            </div>
            <div class="bg-green-50/50 p-4 rounded-xl border border-green-100 flex flex-col justify-between">
                <span class="text-[11px] font-bold text-gray-400 uppercase">Đang hoạt động</span>
                <span id="kpi-active" class="text-xl font-bold text-green-600 my-1">0</span>
            </div>
            <div class="bg-amber-50/50 p-4 rounded-xl border border-amber-100 flex flex-col justify-between">
                <span class="text-[11px] font-bold text-gray-400 uppercase">Tạm ngừng</span>
                <span id="kpi-paused" class="text-xl font-bold text-amber-500 my-1">0</span>
            </div>
            <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 flex flex-col justify-between">
                <span class="text-[11px] font-bold text-gray-400 uppercase">Bằng SHTT đã cấp</span>
                <span id="kpi-shtt" class="text-xl font-bold text-blue-600 my-1">0</span>
            </div>
            <div class="bg-teal-50/50 p-4 rounded-xl border border-teal-100 flex flex-col justify-between">
                <span class="text-[11px] font-bold text-gray-400 uppercase">DN KH&CN đã cấp</span>
                <span id="kpi-khcn" class="text-xl font-bold text-teal-600 my-1">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="border border-gray-100 rounded-xl p-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-3"><i class="fa-solid fa-chart-bar mr-2 text-indigo-500"></i>Tỷ Trọng Lĩnh Vực</h3>
                <table class="w-full text-xs sm:text-sm text-left">
                    <thead><tr class="text-[11px] text-gray-400 border-b pb-1"><th class="pb-1">Lĩnh vực</th><th class="text-center">Số DA</th><th class="text-right">Doanh thu</th></tr></thead>
                    <tbody id="sector-table-body"></tbody>
                </table>
            </div>
            <div class="border border-gray-100 rounded-xl p-4 lg:col-span-2 overflow-x-auto">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-3"><i class="fa-solid fa-list mr-2 text-indigo-500"></i>Danh Sách Dự Án Đang Lọc</h3>
                <table class="w-full text-xs sm:text-sm text-left min-w-[450px]">
                    <thead><tr class="text-[11px] text-gray-400 border-b pb-1"><th>Mã DA</th><th>Tên dự án</th><th>Lĩnh vực</th><th>Trạng thái</th><th class="text-right">Doanh thu</th></tr></thead>
                    <tbody id="dash-project-table-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script>
        function render() {
            const searchVal = document.getElementById('search-dashboard').value.toLowerCase().trim();
            const secFilter = document.getElementById('filter-sector').value;
            const statFilter = document.getElementById('filter-status').value;

            let fProjects = db_projects.filter(p => {
                return (p.name.toLowerCase().includes(searchVal) || p.id.toLowerCase().includes(searchVal)) &&
                       (secFilter === 'All' || p.sector === secFilter) && (statFilter === 'All' || p.status === statFilter);
            });

            document.getElementById('kpi-revenue').innerText = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(fProjects.reduce((sum, p) => sum + p.revenue, 0));
            document.getElementById('kpi-active').innerText = fProjects.filter(p => p.status === 'Còn hoạt động').length;
            document.getElementById('kpi-paused').innerText = fProjects.filter(p => p.status === 'Tạm ngừng').length;
            let validIds = fProjects.map(p => p.id);
            document.getElementById('kpi-shtt').innerText = db_shtt.filter(s => validIds.includes(s.id) && s.state === 'Đã cấp giấy').length;
            document.getElementById('kpi-khcn').innerText = db_certs.filter(c => validIds.includes(c.id) && c.type === 'DN Khoa học & Công nghệ' && c.state === 'Đã cấp giấy').length;

            document.getElementById('dash-project-table-body').innerHTML = fProjects.map(p => `
                <tr><td class="p-2 font-bold text-indigo-900">${p.id}</td><td class="p-2 font-medium">${p.name}</td><td class="p-2">${p.sector}</td><td class="p-2">${p.status}</td><td class="p-2 text-right font-semibold">${new Intl.NumberFormat('vi-VN').format(p.revenue)} Đ</td></tr>
            `).join('');

            const sectors = ["Công nghệ số", "IoT", "AI", "Sinh học"];
            document.getElementById('sector-table-body').innerHTML = sectors.map(sec => {
                let secProjects = fProjects.filter(p => p.sector === sec);
                return `<tr><td class="py-2">${sec}</td><td class="text-center font-bold">${secProjects.length}</td><td class="text-right">${new Intl.NumberFormat('vi-VN').format(secProjects.reduce((sum, p) => sum + p.revenue, 0))} Đ</td></tr>`;
            }).join('');
        }
        window.onload = render;
    </script>
</body>
</html>
