<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white text-xs text-gray-700 p-2">
    
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-5 mb-6">
        <div class="col-span-2 lg:col-span-1 bg-blue-600 p-4 sm:p-5 rounded-2xl text-white shadow-sm relative overflow-hidden">
            <p class="text-blue-100 font-bold uppercase tracking-wider text-[9px] sm:text-[10px]">Tổng doanh thu chung</p>
            <h3 id="kpi-rev" class="text-base sm:text-xl font-black mt-1">0 Đ</h3>
            <i class="fa-solid fa-wallet absolute -right-3 -bottom-3 text-white/10 text-5xl"></i>
        </div>
        <div class="bg-slate-50 border border-slate-100 p-4 sm:p-5 rounded-2xl flex items-center justify-between">
            <div><p class="text-slate-400 font-bold text-[9px] sm:text-[10px] uppercase tracking-widest">Dự án vận hành</p><h3 id="kpi-total" class="text-base sm:text-xl font-black text-slate-800 mt-1">0</h3></div>
            <div class="p-2 bg-blue-50 text-blue-600 rounded-xl text-xs"><i class="fa-solid fa-cubes"></i></div>
        </div>
        <div class="bg-slate-50 border border-slate-100 p-4 sm:p-5 rounded-2xl flex items-center justify-between">
            <div><p class="text-slate-400 font-bold text-[9px] sm:text-[10px] uppercase tracking-widest">Văn bằng SHTT cấp</p><h3 id="kpi-shtt" class="text-base sm:text-xl font-black text-blue-600 mt-1">0</h3></div>
            <div class="p-2 bg-indigo-50 text-blue-600 rounded-xl text-xs"><i class="fa-solid fa-stamp"></i></div>
        </div>
        <div class="bg-slate-50 border border-slate-100 p-4 sm:p-5 rounded-2xl flex items-center justify-between">
            <div><p class="text-slate-400 font-bold text-[9px] sm:text-[10px] uppercase tracking-widest">Doanh nghiệp KHCN</p><h3 id="kpi-khcn" class="text-base sm:text-xl font-black text-emerald-600 mt-1">0</h3></div>
            <div class="p-2 bg-emerald-50 text-emerald-600 rounded-xl text-xs"><i class="fa-solid fa-certificate"></i></div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 border border-slate-200 rounded-2xl p-4 sm:p-5 shadow-sm">
            <h3 class="font-bold text-slate-800 text-xs mb-4 uppercase tracking-wider flex items-center">
                <span class="w-1.5 h-3.5 bg-blue-600 rounded-full mr-2"></span> Theo dõi dự án mới cập nhật
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs min-w-[450px]">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-100 text-[10px] uppercase font-bold">
                            <th class="pb-2.5">Tên Dự án</th>
                            <th class="pb-2.5">Doanh nghiệp công ty chủ quản</th>
                            <th class="pb-2.5">Ngành dọc</th>
                            <th class="pb-2.5 text-center w-24">Hiện trạng</th>
                        </tr>
                    </thead>
                    <tbody id="proj-body" class="divide-y divide-slate-100 text-slate-600"></tbody>
                </table>
            </div>
        </div>

        <div class="border border-slate-200 rounded-2xl p-4 sm:p-5 shadow-sm">
            <h3 class="font-bold text-slate-800 text-xs mb-4 uppercase tracking-wider">Cơ cấu ngành dọc (%)</h3>
            <div id="sector-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        function render() {
            const projects = JSON.parse(localStorage.getItem('db_projects')) || [];
            const shtt = JSON.parse(localStorage.getItem('db_shtt')) || [];
            const certs = JSON.parse(localStorage.getItem('db_certs')) || [];

            // Cơ chế bọc kiểm tra an toàn: Tránh lỗi khi trang mẹ chưa nạp xong hàm
            let totalRev = 0;
            if (window.parent && typeof window.parent.parseRevenueToNumber === 'function') {
                totalRev = projects.reduce((sum, p) => {
                    let text = "0 Đ";
                    if (p.revenue) text = p.revenue;
                    else if (p.metrics && p.metrics.revenue) text = p.metrics.revenue;
                    return sum + window.parent.parseRevenueToNumber(text);
                }, 0);
            }

            if (window.parent && typeof window.parent.formatRevenueToString === 'function') {
                document.getElementById('kpi-rev').innerText = window.parent.formatRevenueToString(totalRev);
            } else {
                document.getElementById('kpi-rev').innerText = totalRev.toLocaleString('vi-VN') + " Đ";
            }

            document.getElementById('kpi-total').innerText = projects.filter(p => p.status === "Còn hoạt động").length;
            document.getElementById('kpi-shtt').innerText = shtt.filter(s => s.state === 'Đã cấp giấy' || s.state === 'CB').length;
            document.getElementById('kpi-khcn').innerText = certs.filter(c => c.state === 'Đã cấp giấy').length;

            document.getElementById('proj-body').innerHTML = projects.slice(-4).reverse().map(p => `
                <tr>
                    <td class="py-3 font-bold text-slate-700">${p.name}</td>
                    <td class="py-3 text-slate-500">${p.company}</td>
                    <td class="py-3"><span class="px-2 py-0.5 bg-slate-100 text-slate-600 rounded font-medium text-[10px]">${p.sector}</span></td>
                    <td class="py-3 text-center"><span class="w-2 h-2 rounded-full inline-block ${p.status==='Còn hoạt động'?'bg-emerald-500':'bg-amber-500'}"></span></td>
                </tr>
            `).join('');

            const sectors = ["Công nghệ số", "IoT", "AI", "Sinh học"];
            document.getElementById('sector-list').innerHTML = sectors.map(s => {
                const count = projects.filter(p => p.sector && p.sector.includes(s)).length;
                const percent = projects.length ? (count / projects.length * 100) : 0;
                return `
                    <div class="space-y-1">
                        <div class="flex justify-between font-bold text-slate-600 text-[10px]"><span>${s}</span><span>${count} DA</span></div>
                        <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-600 rounded-full" style="width: ${percent}%"></div></div>
                    </div>`;
            }).join('');
        }

        // Đợi toàn bộ cây DOM được tạo xong mới kích hoạt bộ quét trễ nhằm đồng bộ tối đa với trang mẹ
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(render, 150);
        });
    </script>
</body>
</html>
