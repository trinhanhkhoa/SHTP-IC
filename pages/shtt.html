<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-xs text-gray-700 p-2">
    <div class="space-y-4 border border-slate-200 rounded-2xl p-5 shadow-sm">
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <input type="text" id="search" oninput="render()" placeholder="Lọc theo dự án..." class="border border-slate-200 rounded-xl p-2.5 bg-slate-50 outline-none focus:border-blue-500">
            <select id="f-type" onchange="render()" class="border border-slate-200 rounded-xl p-2.5 bg-white outline-none"><option value="All">Tất cả loại hình</option><option value="SC">Bằng sáng chế</option><option value="GPHI">Giải pháp hữu ích</option><option value="BQTG">Bản quyền tác giả</option></select>
            <select id="f-state" onchange="render()" class="border border-slate-200 rounded-xl p-2.5 bg-white outline-none"><option value="All">Tất cả trạng thái</option><option value="Chưa nộp đơn">Chưa nộp đơn</option><option value="Đã nộp đơn">Đã nộp đơn</option><option value="Đã cấp giấy">Đã cấp giấy</option></select>
        </div>

        <div class="overflow-hidden border border-slate-200 rounded-xl">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-white text-[10px] uppercase font-bold">
                    <tr>
                        <th class="p-3 text-center w-12">STT</th>
                        <th class="p-3">Dự án chủ quản</th>
                        <th class="p-3">Phân loại SHTT</th>
                        <th class="p-3">Tên tài sản trí tuệ (TSTT)</th>
                        <th class="p-3 font-mono">Số đơn</th>
                        <th class="p-3 text-center w-36">Hiện trạng đơn</th>
                    </tr>
                </thead>
                <tbody id="tbody" class="divide-y divide-slate-100 bg-white"></tbody>
            </table>
        </div>
    </div>

    <script>
        const db_shtt = JSON.parse(localStorage.getItem('db_shtt')) || [];

        // NHÃN PHÂN BIỆT MÀU SẮC ĐẶC TRƯNG CHO TỪNG LOẠI ĐƠN SHTT
        const typeLabels = { 
            "SC": "bg-blue-50 text-blue-600 border border-blue-100", 
            "GPHI": "bg-purple-50 text-purple-600 border border-purple-100", 
            "BQTG": "bg-teal-50 text-teal-600 border border-teal-100" 
        };
        const stateLabels = { 
            "Cấp bằng": "bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold", 
            "Đã cấp giấy": "bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold", 
            "Đã nộp đơn": "bg-amber-50 text-amber-700 border border-amber-200 font-medium", 
            "Chưa nộp đơn": "bg-slate-100 text-slate-400" 
        };

        function render() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            const type = document.getElementById('f-type').value;
            const state = document.getElementById('f-state').value;

            let filtered = db_shtt.filter(s => (s.projectName || '').toLowerCase().includes(query) && (type === 'All' || s.type === type) && (state === 'All' || s.state === state));

            let count = 1;
            document.getElementById('tbody').innerHTML = filtered.map(s => `
                <tr class="hover:bg-slate-50/50">
                    <td class="p-3 text-center font-bold text-slate-400">${count++}</td>
                    <td class="p-3 font-bold text-slate-800">${s.projectName || 'Dự án hệ thống'}</td>
                    <td class="p-3"><span class="px-2 py-0.5 rounded text-[10px] font-black uppercase border ${typeLabels[s.type] || 'bg-slate-50'}">${s.type}</span></td>
                    <td class="p-3 text-slate-600 font-medium">${s.name}</td>
                    <td class="p-3 font-mono text-slate-400 text-[11px]">${s.docNum || '-'}</td>
                    <td class="p-3 text-center"><span class="px-2 py-0.5 rounded-full text-[10px] font-semibold ${stateLabels[s.state] || 'bg-slate-50'}">${s.state}</span></td>
                </tr>
            `).join('');
        }
        window.onload = render;
    </script>
</body>
</html>
